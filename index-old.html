<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villani Rocket Engine Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1d23;--panel:#22262e;--border:#333840;--accent:#4f9cf7;--accent2:#f7954f;--accent3:#4ff78a;--text:#e0e4ea;--dim:#8890a0;--red:#f74f4f;--warn:#f7d74f}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.header{background:linear-gradient(135deg,#1e2230,#2a1e30);padding:12px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.header h1{font-size:1.3em;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:var(--dim);font-size:.8em}
.header .spacer{flex:1}
.unit-toggle{display:flex;background:#181b20;border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:.8em;cursor:pointer}
.unit-toggle span{padding:6px 14px;transition:all .2s;user-select:none;font-weight:600}
.unit-toggle span.active{background:var(--accent);color:#fff}
.unit-toggle span:not(.active){color:var(--dim)}
.unit-toggle span:not(.active):hover{color:var(--text)}
.layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:340px;min-width:340px;overflow-y:auto;border-right:1px solid var(--border);padding:8px}
.main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.section{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.sec-head{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:.85em;user-select:none}
.sec-head:hover{background:rgba(255,255,255,.03)}
.sec-head .arrow{transition:transform .2s;font-size:.7em;color:var(--dim)}
.sec-head.open .arrow{transform:rotate(90deg)}
.sec-body{padding:4px 14px 14px;display:none}
.sec-body.open{display:block}
.field{margin-bottom:8px}
.field label{display:block;font-size:.75em;color:var(--dim);margin-bottom:3px}
.field input,.field select{width:100%;background:#181b20;border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:4px;font-size:.85em}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:8px}
.row .field{flex:1}
.results-bar{display:flex;flex-wrap:wrap;gap:10px}
.res-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:140px;flex:1}
.res-card .val{font-size:1.4em;font-weight:700;color:var(--accent)}
.res-card .lbl{font-size:.72em;color:var(--dim);margin-top:2px}
.res-card.warn .val{color:var(--warn)}
.res-card.cls .val{color:var(--accent2);font-size:1.6em}
.charts{display:flex;gap:16px;flex-wrap:wrap}
.chart-box{flex:1;min-width:300px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px}
.chart-box h3{font-size:.82em;color:var(--dim);margin-bottom:8px}
canvas{width:100%;border-radius:4px}
.nozzle-wrap{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px}
.nozzle-wrap h3{font-size:.82em;color:var(--dim);margin-bottom:8px}
.nozzle-hint{font-size:.7em;color:var(--dim);margin-bottom:8px;font-style:italic}
svg{display:block}
.ctrl-pt{cursor:ns-resize;transition:r .15s}
.ctrl-pt:hover{r:7}
.btn{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:.85em;cursor:pointer;font-weight:600;width:100%;margin-top:4px}
.btn:hover{filter:brightness(1.15)}
.flight-events{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px}
.flight-events h3{font-size:.82em;color:var(--dim);margin-bottom:8px}
.evt{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:.82em}
.evt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.preset-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.preset-btn{background:#181b20;border:1px solid var(--border);color:var(--dim);padding:4px 8px;border-radius:4px;font-size:.7em;cursor:pointer}
.preset-btn:hover,.preset-btn.active{border-color:var(--accent);color:var(--accent)}
@media(max-width:900px){.layout{flex-direction:column;height:auto}.sidebar{width:100%;min-width:0;max-height:50vh;border-right:none;border-bottom:1px solid var(--border)}.charts{flex-direction:column}}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
  body{background:#fff;color:#111}
  .header{background:#fff!important;border-bottom:2px solid #111;padding:8px 16px}
  .header h1{-webkit-text-fill-color:#111;font-size:1.4em}
  .header .sub{color:#444}
  .unit-toggle{border-color:#999}
  .unit-toggle span.active{background:#333;color:#fff}
  .unit-toggle span:not(.active){color:#666}
  .layout{flex-direction:column;height:auto}
  .sidebar{width:100%;min-width:0;max-height:none;border:none;overflow:visible;padding:0 8px}
  .section{background:#fff;border:1px solid #999;break-inside:avoid;margin-bottom:8px}
  .sec-head{color:#111} .sec-body{display:block!important}
  .field label{color:#444} .field input,.field select{border:1px solid #999;background:#fff;color:#111}
  .btn{display:none}
  .main{padding:8px}
  .nozzle-wrap{background:#fff;border:1px solid #999;break-inside:avoid}
  .nozzle-wrap h3,.chart-box h3,.flight-events h3{color:#333}
  .res-card{background:#fff;border:1px solid #999;break-inside:avoid}
  .res-card .lbl{color:#444}
  .res-card .val{color:#111!important}
  .res-card.cls .val{color:#333!important;font-weight:800}
  .chart-box{background:#fff;border:1px solid #999;break-inside:avoid}
  .flight-events{background:#fff;border:1px solid #999;break-inside:avoid}
  .evt{color:#111}
  .preset-row{display:none}
  .nozzle-hint{color:#555}
}
</style>
</head>
<body>
<div class="header">
  <h1>&#9650; Villani Rocket Engine Calculator</h1>
  <span class="sub">BATES Grain &bull; De Laval Nozzle &bull; Flight Simulation</span>
  <span class="spacer"></span>
  <div class="unit-toggle" id="unitToggle">
    <span data-u="imp" class="active">Imperial</span>
    <span data-u="met">Metric</span>
  </div>
</div>
<div class="layout">
<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"></div>
</div>

<script>
// ── All internal state is METRIC (mm, kg, m, m/s, g/cm³) ──
const S = {
  grainOD:38, grainID:12, grainLen:70, grainCount:3,
  propA:8.26, propN:0.319, propRho:1.841, propCstar:889, propGamma:1.133,
  nozThroat:10, nozExit:18, nozConvAngle:45, nozDivAngle:15,
  rktMass:0.8, rktDiam:52, rktCd:0.45,
  drogueCd:1.5, drogueDiam:0.3, mainCd:2.2, mainDiam:0.9, mainAlt:150,
};

let units = 'imp'; // 'imp' or 'met'

// ── Conversion helpers ──
const MM_IN = 25.4;
const KG_LB = 2.20462;
const M_FT = 3.28084;
const N_LBF = 4.44822;
const GCM3_LBIN3 = 27.68;
const MPS_FPS = 0.3048;

// Field definitions: key, metric label, metric unit, imperial label, imperial unit, toImp(metricVal), toMet(impVal), step_met, step_imp, min
const FIELDS = {
  grainOD:    {ml:'Outer Dia (mm)', il:'Outer Dia (in)',     toI:v=>v/MM_IN,       toM:v=>v*MM_IN,       sm:0.5,  si:0.025, min:0},
  grainID:    {ml:'Core Dia (mm)',   il:'Core Dia (in)',      toI:v=>v/MM_IN,       toM:v=>v*MM_IN,       sm:0.5,  si:0.025, min:0},
  grainLen:   {ml:'Length (mm)',      il:'Length (in)',         toI:v=>v/MM_IN,       toM:v=>v*MM_IN,       sm:1,    si:0.05,  min:0},
  grainCount: {ml:'# Grains',        il:'# Grains',           toI:v=>v,             toM:v=>v,             sm:1,    si:1,     min:1},
  propA:      {ml:'Burn Rate a (mm/s)',il:'Burn Rate a (mm/s)',toI:v=>v,             toM:v=>v,             sm:0.01, si:0.01,  min:0},
  propN:      {ml:'Pressure Exp n',   il:'Pressure Exp n',    toI:v=>v,             toM:v=>v,             sm:0.001,si:0.001, min:0},
  propRho:    {ml:'Density (g/cm³)',  il:'Density (lb/in³)',   toI:v=>v/GCM3_LBIN3, toM:v=>v*GCM3_LBIN3,  sm:0.001,si:0.0001,min:0},
  propCstar:  {ml:'c* (m/s)',         il:'c* (ft/s)',          toI:v=>v/MPS_FPS,     toM:v=>v*MPS_FPS,     sm:1,    si:1,     min:0},
  propGamma:  {ml:'γ (Cp/Cv)',        il:'γ (Cp/Cv)',          toI:v=>v,             toM:v=>v,             sm:0.001,si:0.001, min:1.01},
  nozThroat:  {ml:'Throat Dia (mm)', il:'Throat Dia (in)',    toI:v=>v/MM_IN,       toM:v=>v*MM_IN,       sm:0.5,  si:0.025, min:0},
  nozExit:    {ml:'Exit Dia (mm)',   il:'Exit Dia (in)',      toI:v=>v/MM_IN,       toM:v=>v*MM_IN,       sm:0.5,  si:0.025, min:0},
  nozConvAngle:{ml:'Conv Half-Angle (°)',il:'Conv Half-Angle (°)',toI:v=>v,          toM:v=>v,             sm:1,    si:1,     min:10},
  nozDivAngle:{ml:'Div Half-Angle (°)',il:'Div Half-Angle (°)',toI:v=>v,            toM:v=>v,             sm:1,    si:1,     min:5},
  rktMass:    {ml:'Dry Mass (kg)',    il:'Dry Mass (lb)',      toI:v=>v*KG_LB,      toM:v=>v/KG_LB,       sm:0.01, si:0.01,  min:0},
  rktDiam:    {ml:'Body Dia (mm)',    il:'Body Dia (in)',      toI:v=>v/MM_IN,       toM:v=>v*MM_IN,       sm:1,    si:0.05,  min:0},
  rktCd:      {ml:'Drag Coeff Cd',   il:'Drag Coeff Cd',      toI:v=>v,             toM:v=>v,             sm:0.01, si:0.01,  min:0.1},
  drogueCd:   {ml:'Drogue Cd',       il:'Drogue Cd',          toI:v=>v,             toM:v=>v,             sm:0.1,  si:0.1,   min:0.5},
  drogueDiam: {ml:'Drogue Dia (m)',   il:'Drogue Dia (ft)',    toI:v=>v*M_FT,       toM:v=>v/M_FT,        sm:0.05, si:0.1,   min:0},
  mainCd:     {ml:'Main Cd',          il:'Main Cd',            toI:v=>v,             toM:v=>v,             sm:0.1,  si:0.1,   min:0.5},
  mainDiam:   {ml:'Main Dia (m)',     il:'Main Dia (ft)',      toI:v=>v*M_FT,       toM:v=>v/M_FT,        sm:0.05, si:0.1,   min:0},
  mainAlt:    {ml:'Main Deploy Alt (m)',il:'Main Deploy Alt (ft)',toI:v=>v*M_FT,     toM:v=>v/M_FT,        sm:10,   si:25,    min:0},
};

const PRESETS = {
  'KNSB':{propA:8.26,propN:0.319,propRho:1.841,propCstar:889,propGamma:1.133},
  'KNSU':{propA:8.26,propN:0.319,propRho:1.889,propCstar:907,propGamma:1.133},
  'KNDX':{propA:5.13,propN:0.22, propRho:1.879,propCstar:887,propGamma:1.131},
};

// ── Display value for a field ──
function dispVal(key){
  const f=FIELDS[key]; if(!f) return S[key];
  const v = units==='imp' ? f.toI(S[key]) : S[key];
  return parseFloat(v.toPrecision(6));
}
function fieldLabel(key){
  const f=FIELDS[key]; return units==='imp' ? f.il : f.ml;
}
function fieldStep(key){
  const f=FIELDS[key]; return units==='imp' ? f.si : f.sm;
}

// ── Sidebar ──
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML=`
  ${sec('Grain Geometry','grain',`
    <div class="row">
      ${field('grainOD')} ${field('grainID')}
    </div>
    <div class="row">
      ${field('grainLen')} ${field('grainCount')}
    </div>
  `,true)}
  ${sec('Propellant','prop',`
    <div class="preset-row" id="presets"></div>
    <div class="row">
      ${field('propA')} ${field('propN')}
    </div>
    <div class="row">
      ${field('propRho')} ${field('propCstar')}
    </div>
    ${field('propGamma')}
  `,true)}
  ${sec('Nozzle','nozzle',`
    <div class="row">
      ${field('nozThroat')} ${field('nozExit')}
    </div>
    <div class="row">
      ${field('nozConvAngle')} ${field('nozDivAngle')}
    </div>
    <p style="font-size:.7em;color:var(--dim);margin-top:4px">Drag control points in the nozzle editor →</p>
  `,true)}
  ${sec('Rocket','rocket',`
    <div class="row">
      ${field('rktMass')} ${field('rktDiam')}
    </div>
    ${field('rktCd')}
  `,true)}
  ${sec('Recovery (2-Stage)','recovery',`
    <div class="row">
      ${field('drogueCd')} ${field('drogueDiam')}
    </div>
    <div class="row">
      ${field('mainCd')} ${field('mainDiam')}
    </div>
    ${field('mainAlt')}
  `,true)}
  <button class="btn" onclick="calculate()">Calculate</button>
  `;
  // Wire inputs
  sb.querySelectorAll('input').forEach(el=>{
    const k=el.dataset.key;
    el.value=dispVal(k);
    el.step=fieldStep(k);
    el.addEventListener('input',()=>{
      const raw=parseFloat(el.value)||0;
      const f=FIELDS[k];
      S[k] = units==='imp' ? f.toM(raw) : raw;
      if(['nozThroat','nozExit','nozConvAngle','nozDivAngle'].includes(k)) drawNozzle();
    });
  });
  // Presets
  const pr=document.getElementById('presets');
  Object.keys(PRESETS).forEach(k=>{
    const b=document.createElement('button');
    b.className='preset-btn'; b.textContent=k;
    b.onclick=()=>{
      Object.assign(S,PRESETS[k]);
      refreshInputs();
      pr.querySelectorAll('.preset-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    pr.appendChild(b);
  });
  // Accordion
  sb.querySelectorAll('.sec-head').forEach(h=>{
    h.addEventListener('click',()=>{
      h.classList.toggle('open');
      h.nextElementSibling.classList.toggle('open');
    });
  });
}

function refreshInputs(){
  document.querySelectorAll('#sidebar input[data-key]').forEach(el=>{
    const k=el.dataset.key;
    el.value=dispVal(k);
    el.step=fieldStep(k);
  });
  document.querySelectorAll('#sidebar .field label[data-key]').forEach(lbl=>{
    lbl.textContent=fieldLabel(lbl.dataset.key);
  });
}

function sec(title,id,body,open){
  return `<div class="section"><div class="sec-head ${open?'open':''}" id="sh_${id}"><span>${title}</span><span class="arrow">&#9654;</span></div><div class="sec-body ${open?'open':''}">${body}</div></div>`;
}
function field(key){
  return `<div class="field"><label data-key="${key}">${fieldLabel(key)}</label><input type="number" data-key="${key}" step="${fieldStep(key)}" min="${FIELDS[key].min}"></div>`;
}

// ── Unit Toggle ──
document.getElementById('unitToggle').addEventListener('click',e=>{
  const u=e.target.dataset.u;
  if(!u||u===units) return;
  units=u;
  document.querySelectorAll('#unitToggle span').forEach(s=>s.classList.toggle('active',s.dataset.u===u));
  refreshInputs();
  drawNozzle();
  calculate();
});

// ── Main ──
function buildMain(){
  document.getElementById('main').innerHTML=`
    <div class="nozzle-wrap">
      <h3>De Laval Nozzle Cross-Section <span style="color:var(--accent);font-weight:400">(drag points to edit)</span></h3>
      <div class="nozzle-hint">Orange points: throat &amp; exit radius. Drag vertically to resize.</div>
      <svg id="nozSvg" viewBox="0 0 520 220" style="max-height:220px;width:100%"></svg>
    </div>
    <div class="results-bar" id="results"></div>
    <div class="charts">
      <div class="chart-box"><h3 id="thrustLabel">Thrust Curve</h3><canvas id="thrustChart" height="220"></canvas></div>
      <div class="chart-box"><h3 id="flightLabel">Flight Profile</h3><canvas id="flightChart" height="220"></canvas></div>
    </div>
    <div class="flight-events" id="events"><h3>Flight Events</h3><div id="evtList"></div></div>
  `;
  drawNozzle();
}

// ── Nozzle SVG ──
let dragging=null;
function drawNozzle(){
  const svg=document.getElementById('nozSvg');
  if(!svg) return;
  const cy=110;
  const tR=S.nozThroat/2, eR=S.nozExit/2;
  const scale=Math.min(3,80/Math.max(tR,eR,1));
  const iRs=Math.max(tR*scale+8, S.grainOD/2*Math.min(scale,80/(S.grainOD/2||1))*0.7);
  const tRs=tR*scale, eRs=eR*scale;
  const xI=120, xT=260, xE=420;
  const dTh = units==='imp'?(S.nozThroat/MM_IN).toFixed(3)+'"':S.nozThroat.toFixed(1)+'mm';
  const dEx = units==='imp'?(S.nozExit/MM_IN).toFixed(3)+'"':S.nozExit.toFixed(1)+'mm';
  const eps=((eR*eR)/(tR*tR)).toFixed(2);
  svg.innerHTML=`
    <defs>
      <linearGradient id="ng" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#3a3f4a"/><stop offset="40%" stop-color="#2a2e38"/>
        <stop offset="60%" stop-color="#2a2e38"/><stop offset="100%" stop-color="#3a3f4a"/>
      </linearGradient>
      <linearGradient id="flame" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#f74f4f" stop-opacity="0.6"/>
        <stop offset="50%" stop-color="#f7954f" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#f7d74f" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="60" y1="${cy}" x2="480" y2="${cy}" stroke="#444" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="40" y="${cy+4}" fill="#555" font-size="10" text-anchor="middle">CL</text>
    <path d="M${xI},${cy-iRs} L${xT},${cy-tRs} L${xE},${cy-eRs} L${xE},${cy-eRs-10} L${xT},${cy-tRs-10} L${xI},${cy-iRs-10} Z" fill="url(#ng)" stroke="#555" stroke-width="1"/>
    <path d="M${xI},${cy+iRs} L${xT},${cy+tRs} L${xE},${cy+eRs} L${xE},${cy+eRs+10} L${xT},${cy+tRs+10} L${xI},${cy+iRs+10} Z" fill="url(#ng)" stroke="#555" stroke-width="1"/>
    <path d="M${xI},${cy-iRs} L${xT},${cy-tRs} L${xE},${cy-eRs} L${xE},${cy+eRs} L${xT},${cy+tRs} L${xI},${cy+iRs} Z" fill="#14161a"/>
    <ellipse cx="${xE+50}" cy="${cy}" rx="50" ry="${eRs*0.8}" fill="url(#flame)"/>
    <line x1="${xT}" y1="${cy-tRs}" x2="${xT}" y2="${cy+tRs}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="${xE}" y1="${cy-eRs}" x2="${xE}" y2="${cy+eRs}" stroke="var(--accent2)" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="${xT}" y="18" fill="var(--accent)" font-size="11" text-anchor="middle">Throat: ${dTh}</text>
    <text x="${xE}" y="18" fill="var(--accent2)" font-size="11" text-anchor="middle">Exit: ${dEx}</text>
    <text x="${(xI+xT)/2}" y="${cy-Math.max(tRs,iRs)-18}" fill="var(--dim)" font-size="10" text-anchor="middle">Conv ${S.nozConvAngle.toFixed(0)}°</text>
    <text x="${(xT+xE)/2}" y="${cy-Math.max(tRs,eRs)-18}" fill="var(--dim)" font-size="10" text-anchor="middle">Div ${S.nozDivAngle.toFixed(0)}°</text>
    <text x="${xE+10}" y="${cy+eRs+25}" fill="var(--dim)" font-size="10">ε = ${eps}</text>
    <circle class="ctrl-pt" data-ctrl="throat" cx="${xT}" cy="${cy-tRs}" r="5" fill="var(--accent)" stroke="#fff" stroke-width="1.5"/>
    <circle class="ctrl-pt" data-ctrl="exit" cx="${xE}" cy="${cy-eRs}" r="5" fill="var(--accent2)" stroke="#fff" stroke-width="1.5"/>
  `;
  svg.querySelectorAll('.ctrl-pt').forEach(pt=>{
    pt.addEventListener('mousedown',e=>{e.preventDefault();dragging=pt.dataset.ctrl;});
    pt.addEventListener('touchstart',e=>{e.preventDefault();dragging=pt.dataset.ctrl;},{passive:false});
  });
}
function nozzleDrag(clientY){
  const svg=document.getElementById('nozSvg');
  const rect=svg.getBoundingClientRect();
  const svgY=(clientY-rect.top)/rect.height*220, cy=110;
  const scale=Math.min(3,80/Math.max(S.nozThroat/2,S.nozExit/2,1));
  const dist=Math.max(2,(cy-svgY)/scale);
  if(dragging==='throat'){S.nozThroat=Math.max(2,Math.min(S.nozExit-1,dist*2));syncInput('nozThroat');}
  else if(dragging==='exit'){S.nozExit=Math.max(S.nozThroat+1,dist*2);syncInput('nozExit');}
  drawNozzle();
}
function syncInput(key){
  const el=document.querySelector(`input[data-key="${key}"]`);
  if(el) el.value=dispVal(key);
}
document.addEventListener('mousemove',e=>{if(dragging)nozzleDrag(e.clientY);});
document.addEventListener('mouseup',()=>{dragging=null;});
document.addEventListener('touchmove',e=>{if(dragging)nozzleDrag(e.touches[0].clientY);},{passive:false});
document.addEventListener('touchend',()=>{dragging=null;});

// ── Engine Simulation (always metric internally) ──
function calculate(){
  const dt=0.002, g=9.81;
  const Ro=S.grainOD/2/1000, Ri0=S.grainID/2/1000, Lg0=S.grainLen/1000;
  const N=S.grainCount;
  const rho=S.propRho*1e6/1e3; // g/cm³ → kg/m³
  const a=S.propA/1000, n=S.propN, cstar=S.propCstar, gam=S.propGamma;
  const At=Math.PI*(S.nozThroat/2/1000)**2;
  const Ae=Math.PI*(S.nozExit/2/1000)**2;
  const eps=Ae/At;
  const gp1=gam+1, gm1=gam-1;
  const pe_pc=findExitPressureRatio(gam,eps);
  const Cf0=Math.sqrt(2*gam*gam/gm1*(2/gp1)**(gp1/gm1)*(1-pe_pc**(gm1/gam)))+eps*pe_pc;
  let ri=Ri0, lg=Lg0, time=0, thrustData=[], totalImpulse=0, maxThrust=0;
  const propMass0=N*(S.propRho*1000)*Math.PI*(Ro**2-Ri0**2)*Lg0;
  let propMass=propMass0, iter=0;
  while(ri<Ro && lg>0 && iter<20000){
    iter++;
    const Ab=N*(2*Math.PI*ri*lg+2*Math.PI*(Ro**2-ri**2));
    const Kn=Ab/At;
    const Pc=Math.pow(rho*a*cstar*Kn/Math.pow(1e6,n),1/(1-n));
    if(!isFinite(Pc)||Pc<0) break;
    const F=Cf0*Pc*At;
    const rBurn=a*Math.pow(Pc/1e6,n);
    thrustData.push({t:time,F,Pc:Pc/1e6});
    totalImpulse+=F*dt;
    if(F>maxThrust) maxThrust=F;
    ri+=rBurn*dt; lg-=2*rBurn*dt;
    propMass=N*(S.propRho*1000)*Math.PI*Math.max(0,Ro**2-ri**2)*Math.max(0,lg);
    time+=dt;
  }
  const burnTime=time, avgThrust=burnTime>0?totalImpulse/burnTime:0;
  const cls=motorClass(totalImpulse);

  // Flight sim
  const mDry=S.rktMass, Aref=Math.PI*(S.rktDiam/2/1000)**2, Cd=S.rktCd;
  const drogueA=Math.PI*(S.drogueDiam/2)**2, mainA=Math.PI*(S.mainDiam/2)**2;
  let v=0,alt=0,ft=0,flightData=[],events=[];
  let phase='thrust',thrIdx=0,apogee=0,mainDeployed=false,drogueDeployed=false,landed=false;
  let mCur=mDry+propMass0;
  const fdt=0.01;
  for(ft=0;ft<600&&!landed;ft+=fdt){
    let thrust=0;
    if(phase==='thrust'){
      thrIdx=Math.min(thrustData.length-1,Math.round(ft/dt));
      if(thrIdx<thrustData.length) thrust=thrustData[thrIdx].F;
      mCur=mDry+propMass0*(1-thrIdx/Math.max(1,thrustData.length-1));
      if(ft>=burnTime){phase='coast';events.push({t:ft,alt,name:'Burnout',color:'var(--accent2)'});}
    }
    const rhoAir=1.225*Math.exp(-alt/8500);
    let dragF;
    if(!drogueDeployed) dragF=0.5*rhoAir*v*Math.abs(v)*Cd*Aref;
    else if(!mainDeployed) dragF=0.5*rhoAir*v*Math.abs(v)*S.drogueCd*drogueA;
    else dragF=0.5*rhoAir*v*Math.abs(v)*S.mainCd*mainA;
    v+=(thrust-dragF-mCur*g)/mCur*fdt;
    alt+=v*fdt;
    if(phase==='coast'&&v<=0&&!drogueDeployed){drogueDeployed=true;apogee=alt;events.push({t:ft,alt,name:'Apogee — Drogue Deploy',color:'var(--accent3)'});}
    if(drogueDeployed&&!mainDeployed&&alt<=S.mainAlt){mainDeployed=true;events.push({t:ft,alt,name:`Main Deploy`,color:'var(--warn)'});}
    if(alt<=0&&ft>burnTime){alt=0;landed=true;events.push({t:ft,alt:0,name:'Landing',color:'var(--dim)'});}
    if(Math.round(ft*100)%5===0) flightData.push({t:ft,alt:Math.max(0,alt),v});
  }
  events.unshift({t:0,alt:0,name:'Ignition',color:'var(--red)'});

  // ── Render Results (unit-aware) ──
  const imp=units==='imp';
  const fN=imp?v=>(v/N_LBF):v=>v;
  const fNs=imp?v=>(v/N_LBF):v=>v;
  const fM=imp?v=>(v*KG_LB):v=>v;
  const fAlt=imp?v=>(v*M_FT):v=>v;
  const tU=imp?'lbf':'N', iU=imp?'lbf·s':'Ns', mU=imp?'lb':'kg', aU=imp?'ft':'m';

  const fmt=(v,d=1)=>v.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const res=document.getElementById('results');
  res.innerHTML=`
    <div class="res-card cls"><div class="val">${cls}</div><div class="lbl">Motor Class</div></div>
    <div class="res-card"><div class="val">${fmt(fNs(totalImpulse),1)} ${iU}</div><div class="lbl">Total Impulse</div></div>
    <div class="res-card"><div class="val">${fmt(fN(maxThrust),1)} ${tU}</div><div class="lbl">Max Thrust</div></div>
    <div class="res-card"><div class="val">${fmt(fN(avgThrust),1)} ${tU}</div><div class="lbl">Avg Thrust</div></div>
    <div class="res-card"><div class="val">${fmt(burnTime,2)} s</div><div class="lbl">Burn Time</div></div>
    <div class="res-card"><div class="val">${fmt(fM(propMass0),3)} ${mU}</div><div class="lbl">Propellant Mass</div></div>
    <div class="res-card"><div class="val">${fmt(fAlt(apogee),0)} ${aU}</div><div class="lbl">Est. Apogee</div></div>
    <div class="res-card"><div class="val">${fmt(events[events.length-1]?.t||0,1)} s</div><div class="lbl">Total Flight Time</div></div>
  `;

  // ── Charts ──
  const thrustDisp=thrustData.filter((_,i)=>i%4===0);
  drawLineChart('thrustChart',thrustDisp.map(d=>d.t),[
    {data:thrustDisp.map(d=>fN(d.F)),color:'#4f9cf7',label:`Thrust (${tU})`},
    {data:thrustDisp.map(d=>d.Pc*(imp?145.038:1)*0.15),color:'#f7954f',label:`Pc (${imp?'psi':'MPa'}) scaled`}
  ],'Time (s)',`Thrust (${tU})`);
  drawLineChart('flightChart',flightData.map(d=>d.t),[
    {data:flightData.map(d=>fAlt(d.alt)),color:'#4ff78a',label:`Altitude (${aU})`},
    {data:flightData.map(d=>(imp?d.v/MPS_FPS:d.v)*2),color:'#4f9cf7',label:`Velocity ×2 (${imp?'ft/s':'m/s'})`}
  ],'Time (s)',`Altitude (${aU})`,events.map(e=>({...e,alt:fAlt(e.alt)})));

  const el=document.getElementById('evtList');
  el.innerHTML=events.map(e=>`<div class="evt"><div class="evt-dot" style="background:${e.color}"></div><span><b>${e.t.toFixed(2)}s</b> @ ${fmt(fAlt(e.alt),0)} ${aU} — ${e.name}</span></div>`).join('');
}

function findExitPressureRatio(g,eps){
  let M=2;
  for(let i=0;i<50;i++){
    const t=1+(g-1)/2*M*M;
    const epsCalc=(1/M)*Math.pow(2/(g+1)*t,(g+1)/(2*(g-1)));
    if(Math.abs(epsCalc-eps)<1e-6) break;
    M+=(eps>epsCalc)?0.05:-0.02;
    M=Math.max(1.01,M);
  }
  return Math.pow(1+(g-1)/2*M*M,-g/(g-1));
}
function motorClass(impulse){
  const c=['1/4A','1/2A','A','B','C','D','E','F','G','H','I','J','K','L','M','N','O'];
  let th=0.625;
  for(let i=0;i<c.length;i++){if(impulse<=th)return c[i];th*=2;}
  return 'O+';
}

// ── Canvas Chart ──
function drawLineChart(id,xData,series,xLabel,yLabel,events){
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:20,r:15,b:35,l:55};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  const xMin=0, xMax=Math.max(...xData,0.1);
  let yMax=0;
  series.forEach(s=>{yMax=Math.max(yMax,...s.data.map(Math.abs));});
  const yMin=series.some(s=>s.data.some(d=>d<0))?-yMax*0.3:0;
  yMax*=1.1;
  ctx.strokeStyle='#2a2e38';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=pad.t+ph*(1-i/5);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();
    ctx.fillStyle='#666';ctx.font='10px system-ui';ctx.textAlign='right';
    ctx.fillText((yMin+(yMax-yMin)*i/5).toFixed(1),pad.l-5,y+3);
  }
  for(let i=0;i<=5;i++){
    const x=pad.l+pw*i/5;
    ctx.fillStyle='#666';ctx.textAlign='center';
    ctx.fillText((xMin+(xMax-xMin)*i/5).toFixed(1),x,H-pad.b+15);
  }
  ctx.fillStyle='#888';ctx.font='11px system-ui';ctx.textAlign='center';
  ctx.fillText(xLabel,pad.l+pw/2,H-5);
  ctx.save();ctx.translate(12,pad.t+ph/2);ctx.rotate(-Math.PI/2);ctx.fillText(yLabel,0,0);ctx.restore();

  series.forEach(s=>{
    ctx.save();
    ctx.strokeStyle=s.color;ctx.lineWidth=3;ctx.shadowColor=s.color;ctx.shadowBlur=6;ctx.globalAlpha=1;ctx.beginPath();
    xData.forEach((x,i)=>{
      const px=pad.l+(x-xMin)/(xMax-xMin)*pw;
      const py=pad.t+(1-(s.data[i]-yMin)/(yMax-yMin))*ph;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.restore();
  });

  let lx=pad.l+10;
  series.forEach(s=>{
    ctx.fillStyle=s.color;ctx.font='10px system-ui';
    ctx.fillText(s.label,lx,pad.t-7);
    lx+=ctx.measureText(s.label).width+20;
  });

  if(events){
    events.forEach(e=>{
      const px=pad.l+(e.t-xMin)/(xMax-xMin)*pw;
      if(px>pad.l&&px<pad.l+pw){
        ctx.strokeStyle=e.color;ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(px,pad.t);ctx.lineTo(px,pad.t+ph);ctx.stroke();
        ctx.setLineDash([]);
      }
    });
  }
}

// ── Init ──
buildSidebar();
buildMain();
setTimeout(calculate,100);
</script>
